{% with current=request.resolver_match.url_name|default:'' %}
  <aside class="rounded-3xl border border-[color:var(--admin-border)] bg-[color:var(--admin-surface)] p-4 shadow-sm">
    <div class="space-y-1">
      <div class="px-3 pb-2 text-[11px] font-semibold uppercase tracking-[0.24em] text-[color:var(--admin-muted)]">
        Quick Create
      </div>
      <div class="grid grid-cols-2 gap-2">
        <a
          href="{% url 'site_admin:post_create' %}"
          class="rounded-xl bg-[color:var(--admin-accent)] px-3 py-2 text-center text-xs font-semibold text-white transition hover:bg-[color:var(--admin-accent-strong)]"
        >
          New Post
        </a>
        <a
          href="{% url 'site_admin:page_create' %}"
          class="rounded-xl border border-[color:var(--admin-border)] px-3 py-2 text-center text-xs font-semibold text-[color:var(--admin-ink)] transition hover:bg-[color:var(--admin-bg)]"
        >
          New Page
        </a>
      </div>
    </div>

    <nav class="mt-5 space-y-4" aria-label="Site admin navigation">
      <div class="space-y-1">
        <div class="px-3 text-[11px] font-semibold uppercase tracking-[0.24em] text-[color:var(--admin-muted)]">Main</div>
        <a href="{% url 'site_admin:dashboard' %}" class="site-admin-side-link {% if current == 'dashboard' %}site-admin-side-link--active{% endif %}">Dashboard</a>
        <a href="{% url 'site_admin:post_list' %}" class="site-admin-side-link {% if current == 'post_list' or current == 'post_create' or current == 'post_edit' or current == 'post_delete' or current == 'post_permanent_delete' or current == 'post_upload_photo' or current == 'post_delete_photo' or current == 'nearby_checkin_places' %}site-admin-side-link--active{% endif %}">Posts</a>
        <a href="{% url 'site_admin:page_list' %}" class="site-admin-side-link {% if current == 'page_list' or current == 'page_create' or current == 'page_edit' or current == 'page_delete' %}site-admin-side-link--active{% endif %}">Pages</a>
        <a href="{% url 'site_admin:file_list' %}" class="site-admin-side-link {% if current == 'file_list' or current == 'file_create' or current == 'file_edit' or current == 'file_delete' %}site-admin-side-link--active{% endif %}">Files</a>
      </div>

      <div class="space-y-1">
        <div class="px-3 text-[11px] font-semibold uppercase tracking-[0.24em] text-[color:var(--admin-muted)]">Engagement</div>
        <a href="{% url 'site_admin:interactions' %}" class="site-admin-side-link {% if current == 'interactions' or current == 'comment_list' or current == 'comment_detail' or current == 'comment_approve' or current == 'comment_mark_spam' or current == 'comment_delete' or current == 'webmention_list' or current == 'webmention_create' or current == 'webmention_detail' or current == 'webmention_resend' or current == 'webmention_approve' or current == 'webmention_reject' or current == 'webmention_delete' %}site-admin-side-link--active{% endif %}">
          Interactions
          {% if interactions_pending_count %}
            <span class="site-admin-side-badge">{{ interactions_pending_count }}</span>
          {% endif %}
        </a>
      </div>

      <div class="space-y-1">
        <div class="px-3 text-[11px] font-semibold uppercase tracking-[0.24em] text-[color:var(--admin-muted)]">Operations</div>
        <a href="{% url 'site_admin:analytics_dashboard' %}" class="site-admin-side-link {% if current == 'analytics_dashboard' or current == 'analytics_user_agents' or current == 'analytics_bot_detection' or current == 'analytics_ignored_user_agents' or current == 'analytics_mark_false_positive_user_agent' or current == 'analytics_unmark_false_positive_user_agent' or current == 'analytics_ignored_user_agents_export' or current == 'analytics_errors_by_user_agent' or current == 'analytics_ignore_user_agent' or current == 'analytics_ignore_user_agents_bulk' or current == 'analytics_unignore_user_agent' or current == 'analytics_delete_error' or current == 'redirect_list' or current == 'redirect_create' or current == 'redirect_edit' or current == 'redirect_delete' %}site-admin-side-link--active{% endif %}">Analytics</a>
        <a href="{% url 'site_admin:site_settings' %}" class="site-admin-side-link {% if current == 'site_settings' or current == 'theme_settings' or current == 'theme_git_refs' or current == 'theme_file_edit' or current == 'theme_install_detail' or current == 'menu_list' or current == 'menu_create' or current == 'menu_edit' or current == 'menu_item_delete' or current == 'plugin_list' or current == 'plugin_install' or current == 'plugin_restart_status' or current == 'plugin_update' or current == 'plugin_remove' or current == 'widget_list' or current == 'widget_add' or current == 'widget_reorder' or current == 'widget_edit' or current == 'widget_delete' or current == 'indieauth_settings' or current == 'indieauth_client_create' or current == 'indieauth_client_detail' or current == 'indieauth_client_edit' or current == 'microsub_channel_list' or current == 'microsub_channel_create' or current == 'microsub_channel_reorder' or current == 'microsub_channel_detail' or current == 'microsub_channel_edit' or current == 'microsub_channel_delete' or current == 'microsub_channel_mark_read' or current == 'microsub_feed_add' or current == 'microsub_feed_remove' or current == 'microsub_import_opml' or current == 'mastodon_settings' or current == 'mastodon_disconnect' or current == 'mastodon_manual_sync' or current == 'error_log_list' or current == 'error_log_detail' or current == 'task_log_list' or current == 'task_log_detail' or current == 'micropub_error_list' or current == 'micropub_error_detail' or current == 'indieauth_error_list' or current == 'indieauth_error_detail' %}site-admin-side-link--active{% endif %}">Site Settings</a>
        <a href="{% url 'site_admin:profile_edit' %}" class="site-admin-side-link {% if current == 'profile_edit' or current == 'profile_url_delete' or current == 'profile_email_delete' or current == 'profile_upload_photo' or current == 'profile_delete_photo' %}site-admin-side-link--active{% endif %}">Profile</a>
      </div>
    </nav>
  </aside>
{% endwith %}
