# docker-compose.example.yml
#
# Full self-hosted Webstead stack: web + Celery worker + beat + Postgres + MinIO + Redis.
# Copy this to your deployment directory, rename to docker-compose.yml, and fill in .env.
#
# See docs/DeploymentGuide.md for setup instructions.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webstead
      POSTGRES_USER: webstead
      POSTGRES_PASSWORD: webstead
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://localhost:9000/minio/health/ready || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  webstead:
    image: ghcr.io/crowdersoup/webstead:latest
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  celery-worker:
    image: ghcr.io/crowdersoup/webstead:latest
    command: uv run celery -A config worker -l INFO --concurrency 2
    env_file:
      - .env
    depends_on:
      webstead:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    image: ghcr.io/crowdersoup/webstead:latest
    command: uv run celery -A config beat -l INFO --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    depends_on:
      webstead:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  minio_data:
